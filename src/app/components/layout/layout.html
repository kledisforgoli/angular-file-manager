<div class="d-flex flex-column" style="height: 100vh; overflow: hidden">

  <nav class="navbar px-3 flex-shrink-0" style="height: 52px; z-index: 1060; position: relative"
    [class.navbar-dark]="themeService.darkMode"
    [class.bg-dark]="themeService.darkMode"
    [class.navbar-light]="!themeService.darkMode"
    [class.bg-white]="!themeService.darkMode"
    [class.border-bottom]="!themeService.darkMode"
  >
    <div class="d-flex align-items-center gap-2">
      <button class="btn btn-sm btn-outline-secondary me-1" (click)="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>
      <span class="navbar-brand mb-0 h6 d-flex align-items-center gap-2">
        <i class="bi bi-folder2-open text-primary"></i>
        <span class="d-none d-sm-inline">FileBoard</span>
      </span>
    </div>

    <div class="ms-auto d-flex align-items-center gap-2">
      <span class="badge bg-secondary d-none d-sm-inline">
        <i class="bi bi-person-circle me-1"></i>
        {{ currentUser?.name }}
      </span>
      <span
        class="badge"
        [class.bg-danger]="currentUser?.role === 'admin'"
        [class.bg-primary]="currentUser?.role === 'user'"
      >
        {{ currentUser?.role | uppercase }}
      </span>

      <button
        class="btn btn-sm btn-outline-secondary"
        (click)="toggleHistoryPanel()"
        title="Version History"
      >
        <i class="bi bi-clock-history"></i>
      </button>

      <button
        class="btn btn-sm btn-outline-secondary"
        (click)="themeService.toggleTheme()"
        [title]="themeService.darkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
      >
        <i class="bi" [class.bi-sun]="themeService.darkMode" [class.bi-moon]="!themeService.darkMode"></i>
      </button>

      <button class="btn btn-sm btn-outline-danger" (click)="onLogout()">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </nav>

  <div class="d-flex flex-grow-1 overflow-hidden position-relative">

    @if (isMobile && sidebarOpen) {
      <div
        class="position-fixed start-0 w-100 bg-dark bg-opacity-50"
        style="z-index: 1040; top: 52px; bottom: 0"
        (click)="toggleSidebar()"
      ></div>
    }

    <div
      [class.bg-dark]="themeService.darkMode"
      [class.bg-white]="!themeService.darkMode"
      [class.text-white]="themeService.darkMode"
      [class.border-end]="true"
      [class.border-secondary]="themeService.darkMode"
      [style.visibility]="sidebarOpen ? 'visible' : 'hidden'"
      [style.width]="sidebarOpen ? '240px' : '0'"
      [style.min-width]="sidebarOpen ? '240px' : '0'"
      [style.position]="isMobile ? 'fixed' : 'relative'"
      [style.left]="isMobile ? '0' : 'auto'"
      [style.top]="isMobile ? '52px' : 'auto'"
      [style.bottom]="isMobile ? '0' : 'auto'"
      [style.z-index]="isMobile ? '1050' : 'auto'"
      style="overflow-y: auto; transition: width 0.2s ease"
    >
      <app-sidebar
        (folderSelected)="onFolderSelected($event)"
        [selectedFolderId]="selectedFolderId"
      />
    </div>

    <div class="d-flex flex-column flex-grow-1 overflow-hidden">
      <app-breadcrumb
        [selectedFolderId]="selectedFolderId"
        (folderSelected)="onFolderSelected($event)"
      />
      <app-file-list
        [selectedFolderId]="selectedFolderId"
        (folderSelected)="onFolderSelected($event)"
      />
    </div>

    @if (showHistoryPanel) {
      @if (isMobile) {
        <div
          class="position-fixed start-0 w-100 bg-dark bg-opacity-50"
          style="z-index: 1040; top: 52px; bottom: 0"
          (click)="showHistoryPanel = false"
        ></div>
        <div
          class="position-fixed overflow-auto border-start"
          [class.bg-dark]="themeService.darkMode"
          [class.bg-white]="!themeService.darkMode"
          [class.text-white]="themeService.darkMode"
          style="z-index: 1050; top: 52px; bottom: 0; right: 0; width: 85vw; max-width: 320px"
        >
          <app-history-panel (close)="showHistoryPanel = false" />
        </div>
      } @else {
        <div
          class="border-start overflow-auto"
          [class.bg-dark]="themeService.darkMode"
          [class.bg-white]="!themeService.darkMode"
          [class.text-white]="themeService.darkMode"
          style="width: 320px; min-width: 320px"
        >
          <app-history-panel (close)="showHistoryPanel = false" />
        </div>
      }
    }
  </div>
</div>
