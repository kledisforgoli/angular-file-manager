<div class="p-2">
  <!-- Header -->
  <div
    class="d-flex align-items-center justify-content-between px-2 py-2 border-bottom border-secondary mb-2"
  >
    <span
      class="small text-secondary text-uppercase fw-semibold"
      style="font-size: 11px; letter-spacing: 0.08em"
      >Explorer</span
    >
    <button
      class="btn btn-sm btn-outline-primary py-0 px-1"
      (click)="showNewFolderInput = !showNewFolderInput"
      title="New Folder"
    >
      <i class="bi bi-folder-plus"></i>
    </button>
  </div>

  <!-- New Folder Input -->
  <div class="px-2 mb-2 d-flex gap-1" *ngIf="showNewFolderInput">
    <input
      type="text"
      class="form-control form-control-sm bg-dark text-white border-secondary"
      placeholder="Folder name..."
      [(ngModel)]="newFolderName"
      (keydown.enter)="createFolder()"
      (keydown.escape)="showNewFolderInput = false"
      autofocus
    />
    <button class="btn btn-sm btn-primary" (click)="createFolder()">
      <i class="bi bi-check"></i>
    </button>
  </div>

  <!-- Root item: My Drive -->
  <div
    class="d-flex align-items-center gap-2 px-2 py-1 rounded mb-1"
    [class.bg-primary]="selectedFolderId == 0"
    [class.text-white]="selectedFolderId == 0"
    style="cursor: pointer"
    (click)="selectFolder(0)"
  >
    <i class="bi bi-hdd-fill text-primary"></i>
    <span class="small">My Drive</span>
  </div>

  <!-- Folder Tree -->
  <div *ngFor="let folder of rootFolders; trackBy: trackById">
    <!-- Root level folder -->
    <div
      class="d-flex align-items-center justify-content-between px-2 py-1 rounded"
      [class.bg-primary]="isSelected(folder.id!)"
      style="cursor: pointer"
      (click)="selectFolder(folder.id!)"
    >
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-folder-fill text-warning"></i>
        <span class="small text-white">{{ folder.name }}</span>
      </div>
      <button
        class="btn btn-sm text-danger p-0 px-1"
        (click)="deleteFolder(folder.id!, $event)"
        title="Delete"
      >
        <i class="bi bi-trash3 small"></i>
      </button>
    </div>

    <!-- Child folders -->
    <div
      *ngFor="let child of childMap[folder.id!] || []; trackBy: trackById"
      class="d-flex align-items-center justify-content-between px-2 py-1 rounded"
      [class.bg-primary]="isSelected(child.id!)"
      style="cursor: pointer; padding-left: 28px !important"
      (click)="selectFolder(child.id!)"
    >
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-folder-fill text-warning" style="font-size: 12px"></i>
        <span class="small text-white">{{ child.name }}</span>
      </div>
      <button
        class="btn btn-sm text-danger p-0 px-1"
        (click)="deleteFolder(child.id!, $event)"
        title="Delete"
      >
        <i class="bi bi-trash3 small"></i>
      </button>
    </div>
  </div>
</div>
