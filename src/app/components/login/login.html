<div
  class="min-vh-100 d-flex align-items-center justify-content-center"
  [class.bg-light]="!themeService.darkMode"
  [class.bg-dark]="themeService.darkMode"
>
  <div
    class="card shadow"
    style="width: 400px;"
    [class.bg-dark]="themeService.darkMode"
    [class.text-white]="themeService.darkMode"
    [class.border-secondary]="themeService.darkMode"
  >
    <div class="card-body p-4">

      
      <div class="text-center mb-4">
        <i class="bi bi-folder2-open fs-1 text-primary"></i>
        <h4 class="mt-2 fw-bold">FileBoard</h4>
        <p class="small"
          [class.text-muted]="!themeService.darkMode"
          [class.text-secondary]="themeService.darkMode"
        >
          Log in to your File Management System
        </p>
      </div>

      @if (errorMessage) {
        <div class="alert alert-danger py-2 small">
          <i class="bi bi-exclamation-circle me-1"></i>{{ errorMessage }}
        </div>
      }

      <div class="mb-3">
        <label class="form-label small fw-semibold">USERNAME</label>
        <input
          type="text"
          class="form-control custom-input"
          [(ngModel)]="username"
          placeholder="Enter username"
          (keydown.enter)="onLogin()"
          [class.is-invalid]="(submitted && !username) || errorField === 'both'"
          [class.bg-dark]="themeService.darkMode"
          [class.text-white]="themeService.darkMode"
          [class.border-secondary]="themeService.darkMode"
        />
        @if (submitted && !username) {
          <div class="invalid-feedback d-block">Username is required.</div>
        }
      </div>

      <div class="mb-4">
        <label class="form-label small fw-semibold">PASSWORD</label>
        <div class="input-group">
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="form-control custom-input"
            [(ngModel)]="password"
            placeholder="Enter password"
            (keydown.enter)="onLogin()"
            [class.is-invalid]="(submitted && !password) || errorField === 'both'"
            [class.bg-dark]="themeService.darkMode"
            [class.text-white]="themeService.darkMode"
            [class.border-secondary]="themeService.darkMode"
          />
          <button
            class="btn"
            type="button"
            (click)="showPassword = !showPassword"
            tabindex="-1"
            [class.btn-outline-secondary]="!themeService.darkMode"
            [class.btn-secondary]="themeService.darkMode"
          >
            <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
          </button>
          @if (submitted && !password) {
            <div class="invalid-feedback d-block">Password is required.</div>
          }
        </div>
      </div>

      <button
        class="btn btn-primary w-100"
        (click)="onLogin()"
        [disabled]="loading"
      >
        @if (loading) {
          <span class="spinner-border spinner-border-sm me-2"></span>
        }
        Sign In
      </button>

      <div class="d-flex justify-content-between align-items-center mt-3 small">
        <div>
          <span
            [class.text-muted]="!themeService.darkMode"
            [class.text-secondary]="themeService.darkMode"
          >Don't have an account?</span>
          <a routerLink="/register" class="text-primary fw-semibold text-decoration-none ms-1">Register</a>
        </div>
        <button
          class="btn btn-sm btn-outline-secondary"
          (click)="themeService.toggleTheme()"
          [title]="themeService.darkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
        >
          <i class="bi" [class.bi-sun]="themeService.darkMode" [class.bi-moon]="!themeService.darkMode"></i>
        </button>
      </div>

    </div>
  </div>
</div>
