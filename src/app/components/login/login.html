<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow" style="width: 400px;">
    <div class="card-body p-4">

      <!-- Header -->
      <div class="text-center mb-4">
        <i class="bi bi-folder2-open fs-1 text-primary"></i>
        <h4 class="mt-2 fw-bold">FileBoard</h4>
        <p class="text-muted small">Log in to your File Management System</p>
      </div>

      <!-- Error -->
      @if (errorMessage) {
        <div class="alert alert-danger py-2 small">
          <i class="bi bi-exclamation-circle me-1"></i>{{ errorMessage }}
        </div>
      }

      <!-- Form -->
      <div class="mb-3">
        <label class="form-label small fw-semibold">USERNAME</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="username"
          placeholder="Enter username"
          (keydown.enter)="onLogin()"
        />
      </div>

      <div class="mb-4">
        <label class="form-label small fw-semibold">PASSWORD</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          placeholder="Enter password"
          (keydown.enter)="onLogin()"
        />
      </div>

      <button
        class="btn btn-primary w-100"
        (click)="onLogin()"
        [disabled]="loading"
      >
        @if (loading) {
          <span class="spinner-border spinner-border-sm me-2"></span>
        }
        Sign In
      </button>

      <!-- Demo accounts -->
      <!-- <div class="mt-3 p-3 bg-light rounded small text-muted">
        <div class="fw-semibold mb-1">Demo accounts:</div>
        <div>admin / admin123 — <span class="text-purple">Admin</span></div>
        <div>user / user123 — <span class="text-primary">User</span></div>
      </div> -->

    </div>
  </div>
</div>
