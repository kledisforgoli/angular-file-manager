<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow" style="width: 400px;">
    <div class="card-body p-4">

      <!-- Header -->
      <div class="text-center mb-4">
        <i class="bi bi-folder2-open fs-1 text-primary"></i>
        <h4 class="mt-2 fw-bold">FileBoard</h4>
        <p class="text-muted small">Log in to your File Management System</p>
      </div>

      <!-- Error -->
      @if (errorMessage) {
        <div class="alert alert-danger py-2 small">
          <i class="bi bi-exclamation-circle me-1"></i>{{ errorMessage }}
        </div>
      }

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label small fw-semibold">USERNAME</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="username"
          placeholder="Enter username"
          (keydown.enter)="onLogin()"
          [class.is-invalid]="(submitted && !username) || errorField === 'both'"
        />
        @if (submitted && !username) {
          <div class="invalid-feedback d-block">Username is required.</div>
        }
        @if (errorField === 'both') {
          <div class="invalid-feedback d-block">Invalid username or password.</div>
        }
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="form-label small fw-semibold">PASSWORD</label>
        <div class="input-group">
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="form-control"
            [(ngModel)]="password"
            placeholder="Enter password"
            (keydown.enter)="onLogin()"
            [class.is-invalid]="(submitted && !password) || errorField === 'both'"
          />
          <button
            class="btn btn-outline-secondary"
            type="button"
            (click)="showPassword = !showPassword"
            tabindex="-1"
          >
            <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
          </button>
          @if (submitted && !password) {
            <div class="invalid-feedback d-block">Password is required.</div>
          }
        </div>
      </div>

      <button
        class="btn btn-primary w-100"
        (click)="onLogin()"
        [disabled]="loading"
      >
        @if (loading) {
          <span class="spinner-border spinner-border-sm me-2"></span>
        }
        Sign In
      </button>

      <!-- Register link -->
      <div class="text-center mt-3 small">
        <span class="text-muted">Don't have an account? </span>
        <a routerLink="/register" class="text-primary fw-semibold text-decoration-none">Register</a>
      </div>

    </div>
  </div>
</div>
